<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#030014">
<title>إمبراطور المعرفة</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#FFD700;--gold2:#FFA500;--gold3:#FFEC8B;
  --dark:#030014;--card:rgba(15,10,40,0.85);
  --text:#F0E6FF;--text2:rgba(240,230,255,0.7);--text3:rgba(240,230,255,0.35);
  --purple:#7B2FBE;--blue:#1A237E;--teal:#00BCD4;
  --correct:#00E676;--wrong:#FF1744;
}
html,body{height:100%;overflow-x:hidden;touch-action:manipulation}
body{font-family:'Cairo',sans-serif;background:var(--dark);color:var(--text);min-height:100vh}

/* ===== EPIC BACKGROUND ===== */
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.app{position:relative;z-index:1}

/* ===== SCREENS ===== */
.screen{display:none;flex-direction:column;align-items:center;min-height:100vh;padding:20px 16px 30px;overflow-y:auto}
.screen.active{display:flex}
.quiz-screen{display:none;flex-direction:column;align-items:center;min-height:100vh;padding:20px 12px 30px;padding-top:max(env(safe-area-inset-top,20px),20px)}
.quiz-screen.active{display:flex}

/* ===== HOME SCREEN ===== */
.crown-wrap{position:relative;text-align:center;margin:10px 0 6px}
.crown-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;background:radial-gradient(circle,rgba(255,215,0,0.4),transparent 70%);border-radius:50%;animation:crownPulse 2s ease-in-out infinite}
@keyframes crownPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.7}50%{transform:translate(-50%,-50%) scale(1.3);opacity:1}}
.crown-icon{font-size:60px;position:relative;z-index:1;color:#FFD700;text-shadow:0 0 20px #FFD700,0 0 40px #FFA500;animation:float 3s ease-in-out infinite;font-family:'Cairo',sans-serif;font-weight:900;line-height:1}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.game-title{font-family:'Cinzel Decorative',serif;font-size:clamp(18px,5vw,34px);background:linear-gradient(135deg,#FFD700,#FFF,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;letter-spacing:2px;line-height:1.3;margin-bottom:2px;text-shadow:none;animation:titleShine 3s linear infinite;background-size:200%}
@keyframes titleShine{0%{background-position:0%}100%{background-position:200%}}
.game-subtitle{font-family:'Cinzel',serif;font-size:10px;letter-spacing:8px;color:var(--text3);text-align:center;margin-bottom:14px}

/* LANG */
.lang-row{display:flex;gap:6px;margin-bottom:14px;background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.2);border-radius:50px;padding:4px}
.lang-btn{padding:8px 20px;border-radius:50px;border:none;cursor:pointer;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;transition:all .3s;background:transparent;color:var(--text3);min-height:38px}
.lang-btn.on{background:linear-gradient(135deg,#FFD700,#FFA500);color:#030014;box-shadow:0 4px 15px rgba(255,215,0,0.4)}

/* RANK DISPLAY */
.rank-display{width:100%;max-width:440px;background:linear-gradient(135deg,rgba(123,47,190,0.3),rgba(26,35,126,0.3));border:1px solid rgba(255,215,0,0.3);border-radius:20px;padding:14px;margin-bottom:12px;text-align:center;position:relative;overflow:hidden}
.rank-display::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,215,0,0.05),transparent);pointer-events:none}
.rank-name{font-family:'Cinzel',serif;font-size:22px;color:var(--gold);font-weight:700;margin-bottom:4px}
.rank-stars{font-size:18px;letter-spacing:4px;margin-bottom:8px}
.xp-bar-wrap{width:100%}
.xp-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px}
.xp-bg{height:8px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,0.3)}
.xp-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#7B2FBE,#FFD700,#FFA500);transition:width 1s ease;box-shadow:0 0 10px rgba(255,215,0,0.5)}

/* STATS */
.stats-row{display:flex;gap:8px;margin-bottom:12px;width:100%;max-width:440px}
.stat-box{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,215,0,0.15);border-radius:14px;padding:10px 6px;text-align:center;backdrop-filter:blur(10px)}
.stat-v{font-size:20px;font-weight:800;color:var(--gold)}
.stat-l{font-size:8px;color:var(--text3);margin-top:2px;letter-spacing:1px;text-transform:uppercase}

/* SECTIONS */
.sections-title{font-family:'Cinzel',serif;font-size:13px;color:var(--text3);letter-spacing:4px;margin-bottom:10px;text-transform:uppercase}
.sections-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:440px;margin-bottom:16px}
.sec-card{border-radius:16px;padding:14px 8px 12px;cursor:pointer;text-align:center;position:relative;overflow:hidden;min-height:110px;transition:all .25s;border:1px solid rgba(255,215,0,0.15);background:rgba(15,10,40,0.7);backdrop-filter:blur(10px)}
.sec-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .25s;background:linear-gradient(135deg,rgba(255,215,0,0.1),rgba(123,47,190,0.1))}
.sec-card:active:not(.locked){transform:scale(0.93);background:rgba(255,215,0,0.08)}
.sec-card.locked{opacity:.35;cursor:not-allowed;filter:grayscale(0.5)}
.sec-glow{position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:60px;height:60px;border-radius:50%;opacity:0.3;transition:opacity .25s}
.sec-card:active .sec-glow{opacity:0.6}
.sec-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;margin:0 auto 8px;border:2px solid rgba(255,255,255,0.2);color:#fff;font-family:'Cairo',sans-serif}
.sec-name{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:2px;position:relative;z-index:1}
.sec-pts{font-size:9px;color:var(--text3);position:relative;z-index:1}
.sec-bar{height:3px;background:rgba(255,215,0,0.1);border-radius:99px;margin-top:6px;overflow:hidden;position:relative;z-index:1}
.sec-bar-fill{height:100%;background:linear-gradient(90deg,#7B2FBE,#FFD700);border-radius:99px}
.lock-overlay{position:absolute;top:6px;right:6px;font-size:12px}
.unlock-req{font-size:8px;color:var(--text3);margin-top:4px;position:relative;z-index:1}

/* ===== LEVEL SELECT ===== */
.level-header{text-align:center;margin-bottom:18px;width:100%}
.level-icon{font-size:48px;margin-bottom:6px;filter:drop-shadow(0 0 15px rgba(255,215,0,0.5))}
.level-title{font-family:'Cinzel',serif;font-size:20px;color:var(--gold);margin-bottom:4px}
.level-sub{font-size:11px;color:var(--text3);letter-spacing:3px;text-transform:uppercase}
.lv-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:420px}
.lv-item{border-radius:18px;padding:16px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .2s;position:relative;overflow:hidden;border:1px solid;backdrop-filter:blur(10px)}
.lv-item.easy{border-color:rgba(0,230,118,0.3);background:rgba(0,230,118,0.05)}
.lv-item.medium{border-color:rgba(255,215,0,0.3);background:rgba(255,215,0,0.05)}
.lv-item.hard{border-color:rgba(255,23,68,0.3);background:rgba(255,23,68,0.05)}
.lv-item.locked{opacity:.35;cursor:not-allowed;filter:grayscale(0.5)}
.lv-item:active:not(.locked){transform:scale(0.97)}
.lv-item::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s}
.lv-item.easy::before{background:rgba(0,230,118,0.05)}
.lv-item.medium::before{background:rgba(255,215,0,0.05)}
.lv-item.hard::before{background:rgba(255,23,68,0.05)}
.lv-stars{font-size:22px;flex-shrink:0;width:40px;text-align:center}
.lv-info{flex:1}
.lv-name{font-size:16px;font-weight:800;margin-bottom:2px}
.lv-item.easy .lv-name{color:#00E676}
.lv-item.medium .lv-name{color:#FFD700}
.lv-item.hard .lv-name{color:#FF1744}
.lv-desc{font-size:11px;color:var(--text3)}
.lv-pts-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:4px;display:inline-block}
.lv-item.easy .lv-pts-badge{background:rgba(0,230,118,0.15);color:#00E676}
.lv-item.medium .lv-pts-badge{background:rgba(255,215,0,0.15);color:#FFD700}
.lv-item.hard .lv-pts-badge{background:rgba(255,23,68,0.15);color:#FF1744}
.lv-best{font-size:9px;color:var(--gold);margin-top:3px}
.lv-arrow{font-size:22px;color:var(--text3);flex-shrink:0}
.lv-req-txt{font-size:10px;color:var(--text3)}

/* ===== QUIZ SCREEN ===== */
.q-topbar{width:100%;max-width:600px;display:flex;align-items:center;gap:8px;margin-bottom:14px}
.q-back{background:rgba(255,255,255,0.06);border:1px solid rgba(255,215,0,0.2);color:var(--gold);padding:10px 16px;border-radius:50px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;min-height:44px;transition:all .2s;white-space:nowrap}
.q-back:active{background:rgba(255,215,0,0.1)}
.q-sec-title{font-family:'Cinzel',serif;font-size:18px;color:var(--gold2);flex:1;text-align:center;font-weight:700}
.q-sec-icon{font-size:22px;flex-shrink:0}

/* STATS BAR */
.q-stats{display:flex;gap:6px;width:100%;max-width:600px;margin-bottom:12px}
.q-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,215,0,0.12);border-radius:12px;padding:9px 4px;text-align:center;backdrop-filter:blur(5px)}
.q-stat-v{font-size:17px;font-weight:800;color:var(--gold)}
.q-stat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
.q-stat.danger .q-stat-v{color:#FF1744;animation:blink .4s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* PROGRESS */
.q-progress{width:100%;max-width:600px;height:4px;background:rgba(255,255,255,0.06);border-radius:99px;margin-bottom:10px;overflow:hidden}
.q-progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#7B2FBE,#FFD700);transition:width .5s;box-shadow:0 0 8px rgba(255,215,0,0.4)}

/* QUESTION CARD */
.q-card{width:100%;max-width:600px;border-radius:20px;padding:18px 16px;margin-bottom:10px;position:relative;overflow:hidden;border:1px solid rgba(255,215,0,0.2);background:rgba(15,10,40,0.85);backdrop-filter:blur(20px)}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#FFD700,#7B2FBE,transparent)}
.q-card::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top,rgba(255,215,0,0.04),transparent 70%);pointer-events:none}
.q-cat{font-size:9px;color:var(--gold2);letter-spacing:4px;text-transform:uppercase;margin-bottom:10px;opacity:.8}
.q-num{font-size:11px;color:var(--text3);margin-bottom:6px}
.q-text{font-size:19px;font-weight:700;color:#F8F0FF;line-height:1.65}

/* OPTIONS */
.opts-list{width:100%;max-width:600px;display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.opt{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:0;cursor:pointer;font-family:'Cairo',sans-serif;font-size:15px;color:var(--text);text-align:right;transition:all .15s;min-height:56px;display:flex;align-items:center;overflow:hidden;width:100%;position:relative}
.opt-letter{width:56px;height:56px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;background:rgba(255,255,255,0.05);border-left:1px solid rgba(255,255,255,0.08);color:var(--text3)}
.opt-text{flex:1;padding:12px 14px;text-align:right}
.opt:active:not(:disabled){transform:scale(0.98)}
.opt.selected{border-color:rgba(255,215,0,0.5);background:rgba(255,215,0,0.06)}
.opt.correct{border-color:var(--correct)!important;background:rgba(0,230,118,0.1)!important;color:#00E676}
.opt.correct .opt-letter{background:rgba(0,230,118,0.2);color:#00E676;border-color:rgba(0,230,118,0.3)}
.opt.wrong{border-color:var(--wrong)!important;background:rgba(255,23,68,0.1)!important;color:#FF6B8A}
.opt.wrong .opt-letter{background:rgba(255,23,68,0.2);color:#FF6B8A;border-color:rgba(255,23,68,0.3)}
.opt:disabled{cursor:default;transform:none}

/* FEEDBACK */
.feedback{width:100%;max-width:600px;border-radius:14px;padding:12px 16px;font-size:13px;display:none;margin-bottom:10px;line-height:1.6;border:1px solid;font-weight:600}
.feedback.show{display:block}
.feedback.ok{background:rgba(0,230,118,0.08);border-color:rgba(0,230,118,0.3);color:#00E676}
.feedback.no{background:rgba(255,23,68,0.08);border-color:rgba(255,23,68,0.3);color:#FF6B8A}

/* NEXT BTN */
.next-btn{display:none;width:100%;max-width:600px;padding:16px;font-family:'Cairo',sans-serif;font-size:16px;font-weight:800;border:none;border-radius:50px;cursor:pointer;transition:all .2s;min-height:56px;position:relative;overflow:hidden}
.next-btn.show{display:block}
.next-btn-inner{background:linear-gradient(135deg,#7B2FBE,#FFD700,#FFA500);position:absolute;inset:0;z-index:0;transition:opacity .2s}
.next-btn span{position:relative;z-index:1;color:#030014;font-weight:800}
.next-btn:active{transform:scale(0.97)}

/* ===== END SCREEN ===== */
.end-trophy{font-size:72px;margin:16px 0 8px;color:var(--gold);text-shadow:0 0 30px #FFD700,0 0 60px #FFA500;animation:float 2s ease-in-out infinite;font-family:'Cairo',sans-serif;font-weight:900}
.end-rank-badge{font-family:'Cinzel',serif;font-size:13px;letter-spacing:4px;color:var(--text3);text-transform:uppercase;margin-bottom:6px}
.end-title{font-family:'Cinzel Decorative',serif;font-size:22px;color:var(--gold);margin-bottom:16px;text-align:center}
.end-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;max-width:420px;margin-bottom:14px}
.end-stat{background:rgba(255,255,255,0.04);border:1px solid rgba(255,215,0,0.15);border-radius:14px;padding:12px 6px;text-align:center;backdrop-filter:blur(10px)}
.end-stat-v{font-size:24px;font-weight:800;color:var(--gold)}
.end-stat-l{font-size:8px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}

/* ACCURACY RING */
.acc-ring-wrap{margin-bottom:14px;position:relative;width:100px;height:100px}
.acc-ring-wrap svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.acc-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
.acc-pct{font-size:22px;font-weight:800;color:var(--gold)}
.acc-lbl{font-size:9px;color:var(--text3)}

.end-msg{font-size:14px;color:var(--text2);margin-bottom:18px;text-align:center;max-width:340px;line-height:1.7;padding:0 8px}
.end-btns{display:flex;flex-direction:column;gap:8px;width:100%;max-width:420px}
.end-btn{padding:15px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;border-radius:50px;cursor:pointer;transition:all .2s;min-height:54px;border:none;width:100%}
.end-btn.primary{background:linear-gradient(135deg,#7B2FBE,#FFD700);color:#030014}
.end-btn.secondary{background:rgba(255,255,255,0.05);color:var(--gold);border:1px solid rgba(255,215,0,0.25)}
.end-btn:active{transform:scale(0.97)}

/* GHOST BTN */
.ghost-btn{background:transparent;border:1px solid rgba(255,215,0,0.2);color:var(--gold);padding:12px 24px;border-radius:50px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;margin-top:14px;transition:all .2s;min-height:44px}
.ghost-btn:active{background:rgba(255,215,0,0.08)}

/* COMBO POP */
.combo-pop{position:fixed;top:22%;left:50%;transform:translateX(-50%);font-family:'Cinzel',serif;font-size:22px;pointer-events:none;z-index:999;opacity:0;transition:all .4s;text-align:center}
.combo-pop.show{opacity:1;transform:translateX(-50%) translateY(-20px)}

/* LEVEL UP */
.levelup-overlay{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);opacity:0;pointer-events:none;transition:opacity .4s}
.levelup-overlay.show{opacity:1;pointer-events:auto}
.levelup-box{background:linear-gradient(135deg,rgba(123,47,190,0.9),rgba(3,0,20,0.95));border:2px solid var(--gold);border-radius:24px;padding:32px 24px;text-align:center;max-width:320px;width:90%}
.levelup-icon{font-size:60px;margin-bottom:10px;animation:float 2s ease-in-out infinite}
.levelup-title{font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--gold);margin-bottom:6px}
.levelup-rank{font-family:'Cinzel',serif;font-size:28px;color:#FFF;font-weight:700;margin-bottom:12px}
.levelup-btn{padding:12px 32px;background:linear-gradient(135deg,#FFD700,#FFA500);color:#030014;border:none;border-radius:50px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:800;cursor:pointer}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,215,0,0.3);border-radius:2px}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="app">

<!-- ===== HOME ===== -->
<div class="screen active" id="S_home">
  <div class="crown-wrap">
    <div class="crown-glow"></div>
    <div class="crown-icon">&#9813;</div>
  </div>
  <div class="game-title" id="T_title">إمبراطور المعرفة</div>
  <div class="game-subtitle">EMPEROR OF KNOWLEDGE</div>
  <div class="lang-row">
    <button class="lang-btn on" onclick="setLang('ar')">العربية</button>
    <button class="lang-btn" onclick="setLang('en')">English</button>
  </div>
  <div class="rank-display">
    <div class="rank-name" id="H_rankName">طالب</div>
    <div class="rank-stars" id="H_rankStars">⭐☆☆☆☆</div>
    <div class="xp-bar-wrap">
      <div class="xp-labels"><span id="H_xpCur">0 XP</span><span id="H_xpNext">200 XP للمستوى التالي</span></div>
      <div class="xp-bg"><div class="xp-fill" id="H_xpBar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-v" id="H_score">0</div><div class="stat-l" id="L_pts">النقاط</div></div>
    <div class="stat-box"><div class="stat-v" id="H_correct">0</div><div class="stat-l" id="L_corr">صحيح</div></div>
    <div class="stat-box"><div class="stat-v" id="H_streak">0</div><div class="stat-l" id="L_streak">أفضل سلسلة</div></div>
    <div class="stat-box"><div class="stat-v" id="H_acc">0%</div><div class="stat-l" id="L_acc">الدقة</div></div>
  </div>
  <div class="sections-title" id="L_secs">اختر الفئة</div>
  <div class="sections-grid" id="secGrid"></div>
</div>

<!-- ===== LEVEL SELECT ===== -->
<div class="screen" id="S_level">
  <div class="level-header">
    <div class="level-icon" id="LS_icon">🧮</div>
    <div class="level-title" id="LS_name">الرياضيات</div>
    <div class="level-sub" id="L_chooseLv">اختر المستوى</div>
  </div>
  <div class="lv-list" id="lvList"></div>
  <button class="ghost-btn" onclick="go('home')" id="L_backLv">← رجوع</button>
</div>

<!-- ===== QUIZ ===== -->
<div class="quiz-screen" id="S_quiz">
  <div class="q-topbar">
    <button class="q-back" onclick="confirmBack()" id="L_backQ">← رجوع</button>
    <div class="q-sec-title" id="Q_secTitle">—</div>
    <div class="q-sec-icon" id="Q_secIcon">🧮</div>
  </div>
  <div class="q-stats">

let lang='ar';
let totalScore=0,totalCorrect=0,totalAnswered=0,bestStreak=0,playerLevel=1;
let secPts={math:0,general:0,cinema:0,lit:0,history:0,football:0,geo:0,lang:0,physics:0};
let bestRound={math:[0,0,0],general:[0,0,0],cinema:[0,0,0],lit:[0,0,0],history:[0,0,0],football:[0,0,0],geo:[0,0,0],lang:[0,0,0],physics:[0,0,0]};
let curSec='',curLv=0,curQs=[],curIdx=0,qScore=0,qCorrect=0,streak=0,bestCombo=0;
let timer=0,timerInt=null,answered=false;
let prevLevel=1;

const LETTERS_AR=["أ","ب","ج","د"];
const LETTERS_EN=["A","B","C","D"];
function t(k){return(T[lang]||T.ar)[k]||(T.ar)[k]||k}

function save(){try{localStorage.setItem('EK_V3',JSON.stringify({totalScore,totalCorrect,totalAnswered,bestStreak,playerLevel,secPts,bestRound}));}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem('EK_V3'));if(d){totalScore=d.totalScore||0;totalCorrect=d.totalCorrect||0;totalAnswered=d.totalAnswered||0;bestStreak=d.bestStreak||0;playerLevel=d.playerLevel||1;secPts=d.secPts||secPts;bestRound=d.bestRound||bestRound;prevLevel=playerLevel;}}catch(e){}}

function setLang(l){
  lang=l;
  document.documentElement.lang=l;
  document.documentElement.dir=l==='ar'?'rtl':'ltr';
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('on',b.textContent.trim()===(l==='ar'?'العربية':'English')));
  refreshHome();
}

function go(screen){
  document.querySelectorAll('.screen,.quiz-screen').forEach(s=>{s.classList.remove('active');s.style.display='none';});
  const s=document.getElementById('S_'+screen);
  if(s){s.style.display='flex';requestAnimationFrame(()=>s.classList.add('active'));window.scrollTo(0,0);}
  if(screen==='home')refreshHome();
  save();
}

function getRankIdx(){
  const th=[0,200,500,1000,2000,5000];
  let ri=0;
  for(let i=th.length-1;i>=0;i--){if(totalScore>=th[i]){ri=i;break;}}
  return ri;
}

function refreshHome(){
  document.getElementById('T_title').textContent=t('title');
  document.getElementById('L_pts').textContent=t('pts');
  document.getElementById('L_corr').textContent=t('corr');
  document.getElementById('L_streak').textContent=t('streak');
  document.getElementById('L_acc').textContent=t('acc');
  document.getElementById('L_secs').textContent=t('secs');
  document.getElementById('H_score').textContent=totalScore;
  document.getElementById('H_correct').textContent=totalCorrect;
  document.getElementById('H_streak').textContent=bestStreak;
  const acc=totalAnswered>0?Math.round(totalCorrect/totalAnswered*100):0;
  document.getElementById('H_acc').textContent=acc+'%';
  const ri=getRankIdx();
  const ranks=t('ranks'),stars=t('rankStars');
  document.getElementById('H_rankName').textContent=ranks[ri];
  document.getElementById('H_rankStars').textContent=stars[ri];
  const xpCur=XP[Math.min(ri,XP.length-1)];
  const xpNext=XP[Math.min(ri+1,XP.length-1)];
  const pct=xpNext>xpCur?Math.min(100,Math.round((totalScore-xpCur)/(xpNext-xpCur)*100)):100;
  document.getElementById('H_xpBar').style.width=pct+'%';
  document.getElementById('H_xpCur').textContent=totalScore+' XP';
  document.getElementById('H_xpNext').textContent=lang==='ar'?`${xpNext} XP للمستوى التالي`:`${xpNext} XP for next level`;
  buildGrid();
}

function buildGrid(){
  const g=document.getElementById('secGrid');g.innerHTML='';
  SECS.forEach(s=>{
    const unlocked=totalScore>=s.unlock;
    const pts=secPts[s.id]||0;
    const pct=Math.min(100,Math.round(pts/300*100));
    const d=document.createElement('div');
    d.className='sec-card'+(unlocked?'':' locked');
    d.style.setProperty('--sec-color',s.color);
    d.innerHTML=`
      <div class="sec-glow" style="background:radial-gradient(circle,${s.color}66,transparent)"></div>
      ${!unlocked?'<div class="lock-overlay">X</div>':''}
      <div class="sec-icon" style="background:${s.color}33;border-color:${s.color}66;color:${s.color}">${s.icon}</div>
      <div class="sec-name">${lang==='ar'?s.ar:s.en}</div>
      <div class="sec-pts">${pts} pts</div>
      <div class="sec-bar"><div class="sec-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${s.color}88,${s.color})"></div></div>
      ${!unlocked?`<div class="unlock-req">${t('unlockReq').replace('{n}',s.unlock)}</div>`:''}
    `;
    if(unlocked)d.onclick=()=>showLevels(s.id);
    g.appendChild(d);
  });
}

function showLevels(secId){
  curSec=secId;
  const s=SECS.find(x=>x.id===secId);
  document.getElementById('LS_icon').textContent=s.icon;
  document.getElementById('LS_name').textContent=lang==='ar'?s.ar:s.en;
  document.getElementById('L_chooseLv').textContent=t('chooseLv');
  document.getElementById('L_backLv').textContent=t('back');
  const list=document.getElementById('lvList');list.innerHTML='';
  const cls=['easy','medium','hard'];
  const reqs=[0,150,350];
  cls.forEach((lv,i)=>{
    const locked=totalScore<reqs[i];
    const best=bestRound[secId]?bestRound[secId][i]:0;
    const lvNames=t('lvNames'),lvDescs=t('lvDescs'),lvPts=t('lvPts');
    const stars=['★☆☆','★★☆','★★★'];
    const item=document.createElement('div');
    item.className=`lv-item ${lv}${locked?' locked':''}`;
    item.innerHTML=`
      <div class="lv-stars">${stars[i]}</div>
      <div class="lv-info">
        <div class="lv-name">${lvNames[i]}</div>
        <div class="lv-desc">${lvDescs[i]}</div>
        <div class="lv-pts-badge">${lvPts[i]}</div>
        ${best>0?`<div class="lv-best">🏆 ${lang==='ar'?'أفضل':'Best'}: ${best} pts</div>`:''}
        ${locked?`<div class="lv-req-txt">🔒 ${lang==='ar'?`يحتاج ${reqs[i]} نقطة`:`Needs ${reqs[i]} pts`}</div>`:''}
      </div>
      <div class="lv-arrow">${locked?'🔒':'›'}</div>
    `;
    if(!locked)item.onclick=()=>startQuiz(secId,i);
    list.appendChild(item);
  });
  go('level');
}

function startQuiz(secId,lvIdx){
  curSec=secId;curLv=lvIdx;
  const lv=['easy','medium','hard'][lvIdx];
  curQs=shuffle([...QS[secId][lv]]).slice(0,10);
  curIdx=0;qScore=0;qCorrect=0;streak=0;bestCombo=0;answered=false;
  const s=SECS.find(x=>x.id===secId);
  document.getElementById('Q_secTitle').textContent=lang==='ar'?s.ar:s.en;
  document.getElementById('Q_secIcon').textContent=s.icon;
  document.getElementById('L_backQ').textContent=t('back');
  document.getElementById('L_qsc').textContent=t('sc');
  document.getElementById('L_qpr').textContent=t('pr');
  document.getElementById('L_qstr').textContent=t('str');
  document.getElementById('L_qtm').textContent=t('tm');
  document.getElementById('L_next').textContent=t('next');
  document.querySelectorAll('.screen,.quiz-screen').forEach(s=>{s.classList.remove('active');s.style.display='none';});
  const qs=document.getElementById('S_quiz');
  qs.style.display='flex';requestAnimationFrame(()=>qs.classList.add('active'));
  window.scrollTo(0,0);
  loadQ();
}

function loadQ(){
  if(curIdx>=curQs.length){showEnd();return;}
  answered=false;
  const q=curQs[curIdx];
  const s=SECS.find(x=>x.id===curSec);
  document.getElementById('Q_cat').textContent=(lang==='ar'?s.ar:s.en)+' · '+(lang==='ar'?t('lvNames')[curLv]:t('lvNames')[curLv]);
  document.getElementById('Q_text').textContent=lang==='ar'?q.q:q.e;
  document.getElementById('Q_num').textContent=(curIdx+1)+'/'+curQs.length;
  document.getElementById('Q_prog').style.width=((curIdx+1)/curQs.length*100)+'%';
  document.getElementById('feedbackBox').className='feedback';
  const nb=document.getElementById('nextBtn');nb.className='next-btn';
  const letters=lang==='ar'?LETTERS_AR:LETTERS_EN;
  const list=document.getElementById('optsList');list.innerHTML='';
  q.o.forEach((op,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML=`<div class="opt-letter">${letters[i]}</div><div class="opt-text">${op}</div>`;
    b.onclick=()=>pick(i,b);
    list.appendChild(b);
  });
  startTimer();
}

function startTimer(){
  if(timerInt)clearInterval(timerInt);
  const times=t('lvTimes');
  timer=times[curLv];
  const stat=document.getElementById('timerStat');
  stat.classList.remove('danger');
  document.getElementById('Q_timer').textContent=timer;
  timerInt=setInterval(()=>{
    timer--;
    document.getElementById('Q_timer').textContent=timer;
    if(timer<=5)stat.classList.add('danger');
    if(timer<=0){clearInterval(timerInt);timeUp();}
  },1000);
}

function timeUp(){
  if(answered)return;
  answered=true;
  const q=curQs[curIdx];
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  document.querySelectorAll('.opt')[q.a].classList.add('correct');
  streak=0;
  document.getElementById('Q_streak').textContent='0 x';
  totalAnswered++;
  showFeedback(false,t('tf')+q.o[q.a]);
  playSound('wrong');
  document.getElementById('nextBtn').className='next-btn show';
}

function pick(idx,btn){
  if(answered)return;
  answered=true;
  clearInterval(timerInt);
  const q=curQs[curIdx];
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  document.querySelectorAll('.opt')[q.a].classList.add('correct');
  totalAnswered++;
  const pts=[10,20,40][curLv];
  if(idx===q.a){
    btn.classList.add('correct');
    streak++;if(streak>bestCombo)bestCombo=streak;
    if(streak>bestStreak)bestStreak=streak;
    const bonus=Math.min(streak-1,5)*Math.round(pts*.3);
    const earned=pts+bonus;
    qScore+=earned;totalScore+=earned;
    qCorrect++;totalCorrect++;
    updateLevel();
    if(streak>=3)showCombo(streak,earned);
    showFeedback(true,t('cf')+(streak>1?'  x'+streak:'')+' +'+earned+' pts');
    playSound('correct');
  }else{
    btn.classList.add('wrong');
    streak=0;
    showFeedback(false,t('wf')+q.o[q.a]);
    playSound('wrong');
  }
  document.getElementById('Q_score').textContent=qScore;
  document.getElementById('Q_streak').textContent=streak+' x';
  secPts[curSec]=(secPts[curSec]||0)+(idx===q.a?pts:0);
  save();
  document.getElementById('nextBtn').className='next-btn show';
}

function showFeedback(ok,msg){
  const f=document.getElementById('feedbackBox');
  f.className='feedback show '+(ok?'ok':'no');
  f.textContent=msg;
}

function nextQ(){curIdx++;loadQ();}

function updateLevel(){
  const th=[0,200,500,1000,2000,5000];
  let ri=0;
  for(let i=th.length-1;i>=0;i--){if(totalScore>=th[i]){ri=i+1;break;}}
  if(ri>prevLevel){
    prevLevel=ri;playerLevel=ri;
    showLevelUp(ri);
  }else{playerLevel=ri||1;}
}

}

function shuffle(a){return a.sort(()=>Math.random()-.5)}

// ===== SOUND ENGINE =====
let audioCtx=null;
function getCtx(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}

function playTone(freq,type,start,dur,gain=0.12){
  const ctx=getCtx();if(!ctx)return;
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type=type;o.frequency.setValueAtTime(freq,ctx.currentTime+start);
  g.gain.setValueAtTime(0,ctx.currentTime+start);
  g.gain.linearRampToValueAtTime(gain,ctx.currentTime+start+0.02);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur);
  o.start(ctx.currentTime+start);o.stop(ctx.currentTime+start+dur+0.05);
}

function playSound(type){
  try{
    if(type==='correct'){
      playTone(523,'sine',0,.15,0.1);
      playTone(659,'sine',.1,.15,0.1);
      playTone(784,'sine',.2,.2,0.12);
    }else if(type==='wrong'){
      playTone(300,'sawtooth',0,.1,0.08);
      playTone(200,'sawtooth',.12,.2,0.08);
    }else if(type==='win'){
      [523,659,784,1047,1319].forEach((f,i)=>playTone(f,'sine',i*.1,.25,0.1));
    }else if(type==='lose'){
      [400,350,280,220].forEach((f,i)=>playTone(f,'triangle',i*.12,.2,0.08));
    }else if(type==='levelup'){
      [523,659,784,1047,1319,1568].forEach((f,i)=>playTone(f,'sine',i*.08,.3,0.12));
    }
  }catch(e){}
}

const cv=document.getElementById('bgCanvas');
const cx=cv.getContext('2d');
let W,H;

// Particles
const particles=[];
const PARTICLE_COUNT=120;

function resize(){
  W=cv.width=window.innerWidth;
  H=cv.height=window.innerHeight;
  initParticles();
}

function initParticles(){
  particles.length=0;
  for(let i=0;i<PARTICLE_COUNT;i++){
    particles.push(createParticle(true));
  }
}

function createParticle(random=false){
  const types=['star','orb','sparkle'];
  const type=types[Math.floor(Math.random()*types.length)];
  return{
    x:random?Math.random()*W:Math.random()*W,
    y:random?Math.random()*H:H+20,
    vx:(Math.random()-.5)*.4,
    vy:-(0.1+Math.random()*.5),
    size:type==='star'?Math.random()*2+.5:type==='orb'?Math.random()*4+2:Math.random()*1.5+.5,
    alpha:Math.random(),
    dalpha:(.003+Math.random()*.01)*(Math.random()>.5?1:-1),
    color:['#FFD700','#FFA500','#7B2FBE','#00BCD4','#E91E63','#FFFFFF'][Math.floor(Math.random()*6)],
    type,pulse:Math.random()*Math.PI*2,
    dpulse:.02+Math.random()*.04
  };
}

// Grid lines
let tt=0;
function drawBg(){
  tt+=.005;
  cx.clearRect(0,0,W,H);

  // Deep space gradient
  const bg=cx.createRadialGradient(W*.5,H*.3,0,W*.5,H*.5,Math.max(W,H)*.9);
  bg.addColorStop(0,'#0d0828');
  bg.addColorStop(.3,'#07051a');
  bg.addColorStop(.7,'#030010');
  bg.addColorStop(1,'#010008');
  cx.fillStyle=bg;cx.fillRect(0,0,W,H);

  // Nebulas
  nebulas.forEach(n=>{
    n.angle+=n.dangle;
    const nx=n.x*W,ny=n.y*H;
    const gd=cx.createRadialGradient(nx,ny,0,nx,ny,n.rx*W);
    gd.addColorStop(0,`hsla(${n.h+tt*10},80%,50%,${n.a})`);
    gd.addColorStop(.5,`hsla(${n.h+40+tt*5},60%,35%,.02)`);
    gd.addColorStop(1,'transparent');
    cx.fillStyle=gd;
    cx.save();cx.translate(nx,ny);cx.rotate(n.angle);
    cx.beginPath();cx.ellipse(0,0,n.rx*W,n.ry*H,0,0,Math.PI*2);cx.fill();
    cx.restore();
  });

  // Perspective grid
  cx.strokeStyle='rgba(123,47,190,0.06)';cx.lineWidth=1;
  const gridH=H*.6,vp={x:W/2,y:gridH*.3};
  for(let i=0;i<=20;i++){
    const x=W*i/20;
    cx.beginPath();cx.moveTo(x,gridH);cx.lineTo(vp.x,vp.y);cx.stroke();
  }
  for(let i=0;i<=12;i++){
    const t2=i/12;const y=gridH-(gridH-vp.y)*t2;
    const w2=(W/2)*(1-t2*.7);
    cx.beginPath();cx.moveTo(vp.x-w2,y);cx.lineTo(vp.x+w2,y);cx.stroke();
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.alpha+=p.dalpha;
    p.pulse+=p.dpulse;
    if(p.alpha>1){p.alpha=1;p.dalpha*=-1;}
    if(p.alpha<0||p.y<-20){particles[i]=createParticle();}
    cx.save();cx.globalAlpha=Math.max(0,p.alpha);
    if(p.type==='star'){
      const sz=p.size*(1+.3*Math.sin(p.pulse));
      cx.fillStyle=p.color;
      cx.beginPath();cx.arc(p.x,p.y,sz,0,Math.PI*2);cx.fill();
      if(p.alpha>.6){
        cx.strokeStyle=p.color;cx.lineWidth=.5;cx.globalAlpha=p.alpha*.3;
        cx.beginPath();cx.moveTo(p.x-sz*3,p.y);cx.lineTo(p.x+sz*3,p.y);cx.stroke();
        cx.beginPath();cx.moveTo(p.x,p.y-sz*3);cx.lineTo(p.x,p.y+sz*3);cx.stroke();
      }
    }else if(p.type==='orb'){
      const gd=cx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*2);
      gd.addColorStop(0,p.color);gd.addColorStop(1,'transparent');
      cx.fillStyle=gd;
      cx.beginPath();cx.arc(p.x,p.y,p.size*2,0,Math.PI*2);cx.fill();
    }else{
      cx.fillStyle=p.color;cx.globalAlpha=p.alpha*.8;
      for(let j=0;j<4;j++){
        const a=j*Math.PI/2+p.pulse;
        cx.beginPath();cx.arc(p.x+Math.cos(a)*p.size,p.y+Math.sin(a)*p.size,.5,0,Math.PI*2);cx.fill();
      }
    }
    cx.restore();
  }

  // Shooting stars
  spawnStar();
  for(let i=shootingStars.length-1;i>=0;i--){
    const s=shootingStars[i];
    s.x+=s.vx;s.y+=s.vy;s.a-=.02;
    if(s.a<=0||s.x>W||s.y>H){shootingStars.splice(i,1);continue;}
    const gd=cx.createLinearGradient(s.x-s.vx*8,s.y-s.vy*8,s.x,s.y);
    gd.addColorStop(0,'transparent');
    gd.addColorStop(.5,`rgba(255,215,0,${s.a*.4})`);
    gd.addColorStop(1,`rgba(255,255,255,${s.a})`);
    cx.strokeStyle=gd;cx.lineWidth=2;
    cx.beginPath();cx.moveTo(s.x-s.vx*8,s.y-s.vy*8);cx.lineTo(s.x,s.y);cx.stroke();
  }

  requestAnimationFrame(drawBg);
}

window.addEventListener('resize',resize);
resize();
drawBg();
load();
go('home');
</script>
</body>
</html>
